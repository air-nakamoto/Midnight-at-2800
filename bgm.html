<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>28時の深夜ラジオ BGM設定表</title>
    <meta name="description" content="配布版ココフォリア部屋で設定しているBGMの対応表です。">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <style>
        :root {
            --bg: #151515;
            --panel: #202020;
            --panel-soft: #292929;
            --text: #e8e8e8;
            --muted: #a7a7a7;
            --border: #3b3b3b;
            --accent: #8ac6ff;
            --accent-2: #f3c969;
            --danger: #ff8a8a;
            --ok: #8fe6a7;
            --shadow: rgba(0, 0, 0, 0.35);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: radial-gradient(circle at top, #262018 0, var(--bg) 380px);
            color: var(--text);
            font-family: "Segoe UI", "Yu Gothic UI", "Hiragino Sans", Meiryo, sans-serif;
            line-height: 1.65;
        }

        header {
            padding: 40px clamp(18px, 4vw, 56px) 24px;
            border-bottom: 1px solid var(--border);
            background: rgba(20, 20, 20, 0.88);
            position: sticky;
            top: 0;
            z-index: 5;
            backdrop-filter: blur(8px);
        }

        h1 {
            margin: 0 0 8px;
            font-size: clamp(1.7rem, 3vw, 2.5rem);
            letter-spacing: 0.04em;
        }

        .lead {
            margin: 0;
            color: var(--muted);
            max-width: 980px;
        }

        main { padding: 28px clamp(18px, 4vw, 56px) 56px; }

        .notice,
        .panel {
            background: linear-gradient(145deg, var(--panel), #1b1b1b);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: 0 16px 40px var(--shadow);
        }

        .notice {
            padding: 18px 20px;
            margin-bottom: 24px;
        }

        .notice strong { color: var(--accent-2); }

        .supplement {
            margin: 10px 0 0;
            color: var(--accent-2);
        }

        .folder-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
        }

        .folder-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 999px;
            border: 1px solid var(--border);
            color: var(--text);
            text-decoration: none;
            padding: 7px 12px;
            background: #171717;
        }

        .folder-link:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .controls {
            display: grid;
            gap: 14px;
            margin-bottom: 18px;
        }

        .search {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: #111;
            color: var(--text);
            font-size: 1rem;
            padding: 12px 18px;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        button.filter {
            border: 1px solid var(--border);
            border-radius: 999px;
            background: var(--panel-soft);
            color: var(--text);
            cursor: pointer;
            padding: 7px 12px;
            transition: 0.18s ease;
        }

        button.filter:hover,
        button.filter.active {
            border-color: var(--accent);
            color: #08131d;
            background: var(--accent);
        }

        .table-wrap {
            overflow-x: auto;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--panel);
        }

        table {
            width: 100%;
            min-width: 1080px;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 11px 12px;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
            text-align: left;
        }

        th {
            position: sticky;
            top: 0;
            z-index: 2;
            background: #252525;
            color: var(--accent-2);
            font-size: 0.88rem;
            white-space: nowrap;
        }

        tbody tr:hover { background: rgba(138, 198, 255, 0.06); }

        .num { color: var(--muted); text-align: right; width: 56px; }
        .scene { font-weight: 700; min-width: 180px; }
        .category { white-space: nowrap; }
        .file { font-family: Consolas, "SFMono-Regular", "Yu Gothic UI", monospace; word-break: break-word; }
        .empty { color: #6f6f6f; }

        .pill {
            display: inline-block;
            border-radius: 999px;
            padding: 2px 9px;
            font-size: 0.82rem;
            border: 1px solid var(--border);
            background: #171717;
        }

        .audio-link {
            color: inherit;
            text-decoration: none;
        }

        .audio-link:hover { text-decoration: underline; }

        .folder-se {
            border-color: rgba(255, 176, 209, 0.7);
            color: #ffb0d1;
            background: rgba(255, 176, 209, 0.09);
        }

        .folder-soundtrack {
            border-color: rgba(143, 230, 167, 0.7);
            color: var(--ok);
            background: rgba(143, 230, 167, 0.09);
        }

        .folder-unknown { color: var(--accent); }
        .folder-badge,
        .loop-badge {
            display: inline-block;
            margin-left: 6px;
            color: var(--muted);
            font-size: 0.74rem;
        }

        .loop-badge.loop-on { color: #ffd37a; }
        .loop-badge.loop-off { color: #b7c7ff; }
        .note-warn { color: var(--danger); }

        .section-title {
            margin: 34px 0 14px;
            display: flex;
            align-items: baseline;
            gap: 12px;
        }

        .section-title h2 { margin: 0; font-size: 1.35rem; }
        .section-title span { color: var(--muted); }

        .usage-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 14px;
        }

        .usage-card {
            padding: 16px;
        }

        .usage-card h3 {
            margin: 0 0 10px;
            font-size: 1rem;
            color: var(--accent);
            word-break: break-word;
        }

        .usage-card ul {
            margin: 0;
            padding-left: 1.2em;
            color: var(--muted);
        }

        .count {
            color: var(--muted);
            font-size: 0.92rem;
        }

        @media (max-width: 700px) {
            header { position: static; }
            main { padding-bottom: 32px; }
        }
    </style>
</head>

<body>

        const categories = ['すべて', ...Array.from(new Set(bgmRows.map((row) => row.category)))];
        let activeCategory = 'すべて';

        const tableBody = document.getElementById('bgmTableBody');
        const filters = document.getElementById('filters');
        const search = document.getElementById('search');
        const resultCount = document.getElementById('resultCount');
        const usageList = document.getElementById('usageList');

        function escapeHtml(value) {
            return String(value)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function audioFolder(value) {
            if (!value) return null;
            return seFiles.has(value) ? 'se' : 'soundtrack';
        }

        function loopInfo(value) {
            if (!seFiles.has(value)) return '';
            const isLoopOff = loopOffFiles.has(value);
            const className = isLoopOff ? 'loop-off' : 'loop-on';
            const label = isLoopOff ? 'ループなし' : 'ループ';
            return `<span class="loop-badge ${className}">${label}</span>`;
        }

        function cellValue(value) {
            if (!value) return '<span class="empty">—</span>';
            const folder = audioFolder(value);
            const className = folder === 'se' ? 'folder-se' : 'folder-soundtrack';
            const label = folder === 'se' ? 'SE' : 'サントラ';
            const href = folderLinks[folder];
            return `<span class="file pill ${className}"><a class="audio-link" href="${href}" target="_blank" rel="noopener noreferrer">${escapeHtml(value)}</a><span class="folder-badge">${label}</span>${loopInfo(value)}</span>`;
        }

        function matchesSearch(row, query) {
            if (!query) return true;
            const haystack = Object.values(row).join(' ').toLowerCase();
            return haystack.includes(query.toLowerCase());
        }

        function getVisibleRows() {
            const query = search.value.trim();
            return bgmRows.filter((row) => {
                const categoryOk = activeCategory === 'すべて' || row.category === activeCategory;
                return categoryOk && matchesSearch(row, query);
            });
        }

        function renderFilters() {
            filters.innerHTML = categories.map((category) => {
                const active = category === activeCategory ? ' active' : '';
                return `<button class="filter${active}" type="button" data-category="${escapeHtml(category)}">${escapeHtml(category)}</button>`;
            }).join('');
        }

        function renderTable() {
            const rows = getVisibleRows();
            resultCount.textContent = `${rows.length} / ${bgmRows.length}件表示`;
            tableBody.innerHTML = rows.map((row) => {
                const number = bgmRows.indexOf(row) + 1;
                const noteClass = row.note.includes('要確認') ? 'note-warn' : '';
                return `
                    <tr>
                        <td class="num">${number}</td>
                        <td class="category">${escapeHtml(row.category)}</td>
                        <td class="scene">${escapeHtml(row.scene)}</td>
                        <td>${cellValue(row.bgm1)}</td>
                        <td>${cellValue(row.bgm2)}</td>
                        <td class="${noteClass}">${row.note ? escapeHtml(row.note) : '<span class="empty">—</span>'}</td>
                    </tr>`;
            }).join('');
        }

        function renderUsageList() {
            const usage = new Map();
            for (const row of bgmRows) {
                for (const key of ['bgm1', 'bgm2']) {
                    const value = row[key];
                    if (!value) continue;
                    if (!usage.has(value)) usage.set(value, new Set());
                    usage.get(value).add(row.scene);
                }
            }

            usageList.innerHTML = Array.from(usage.entries())
                .sort((a, b) => a[0].localeCompare(b[0], 'ja'))
                .map(([file, scenes]) => `
                    <article class="panel usage-card ${audioFolder(file) === 'se' ? 'folder-se' : 'folder-soundtrack'}">
                        <h3><a class="audio-link" href="${folderLinks[audioFolder(file)]}" target="_blank" rel="noopener noreferrer">${escapeHtml(file)}</a>${loopInfo(file)}</h3>
                        <ul>${Array.from(scenes).map((scene) => `<li>${escapeHtml(scene)}</li>`).join('')}</ul>
                    </article>`)
                .join('');
        }

        filters.addEventListener('click', (event) => {
            const button = event.target.closest('button[data-category]');
            if (!button) return;
            activeCategory = button.dataset.category;
            renderFilters();
            renderTable();
        });

        search.addEventListener('input', renderTable);

        renderFilters();
        renderTable();
        renderUsageList();
    </script>
</body>

</html>
